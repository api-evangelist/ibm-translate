aid: ibm-translate
url: https://raw.githubusercontent.com/api-evangelist/ibm-translate/refs/heads/main/apis.yml
name: IBM Language Translator
kind: company
description: >-
  IBM Watson Language Translator was a REST API service for translating text between 35+
  languages, detecting input language automatically, and creating custom domain-specific
  translation models using TMX, XLIFF, or CSV training data. The service supported neural
  machine translation (NMT) and was available through IBM Cloud. IBM deprecated the service
  in June 2023 and fully withdrew it in December 2024.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
