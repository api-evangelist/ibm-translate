  - Machine Translation
  - IBM Watson
  - AI
  - Text Analysis
  - Deprecated
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
apis:
  - aid: ibm-translate:language-translator-v3
    name: Language Translator V3
    description: >-
      REST API for translating text between 35+ languages, identifying the language of input
      text, listing available translation models, and creating or managing custom translation
      models. The base URL is https://{region}.ml.cloud.ibm.com with IAM authentication via
      Bearer tokens. API version parameter 2018-05-01 is required on all requests. The service
      was deprecated June 2023 and withdrawn December 2024.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://cloud.ibm.com/apidocs/language-translator
    baseURL: https://api.us-south.language-translator.watson.cloud.ibm.com
    tags:
